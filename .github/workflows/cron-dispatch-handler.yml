name: Cron Dispatch Handler

on:
  repository_dispatch:
    types: [cron-tasks]
    
concurrency:
  group: worker-${{ github.event.client_payload.project }}-${{ github.run_id }}
  cancel-in-progress: true
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  execute:
    name: "Run [${{ github.event.client_payload.project }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VAULT_DIR: 'vault_source'
      PROJECT_NAME: ${{ github.event.client_payload.project }}

    steps:
      - name: Fetch Private Vault
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.GH_SOURCE_VAULT_REPO_2 }}
          token: ${{ secrets.GH_SOURCE_VAULT_PAT }}
          path: ${{ env.VAULT_DIR }}

      # ── 1. 动态加载环境配置 ──
      - name: Load Project Config
        run: |
          set -euo pipefail
          PROJ_DIR="${{ env.VAULT_DIR }}/projects/${{ env.PROJECT_NAME }}"
          CONFIG_FILE="${PROJ_DIR}/config.env"
          
          # 默认兜底配置
          echo "RUNTIME=shell" >> $GITHUB_ENV
          echo "ENTRYPOINT=bash run.sh" >> $GITHUB_ENV
          
          if [[ -f "${CONFIG_FILE}" ]]; then
            echo "加载项目配置: ${CONFIG_FILE}"
            grep -v '^\s*#' "${CONFIG_FILE}" | grep -v '^\s*$' >> $GITHUB_ENV
          else
            echo "::warning::未找到 config.env，降级为原生 Shell 模式"
          fi

      # ── 2. 按需初始化运行时环境 ──
      - name: Setup Python
        if: env.RUNTIME == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION || '3.10' }}

      - name: Setup Node.js
        if: env.RUNTIME == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION || '20' }}

      - name: Setup Go
        if: env.RUNTIME == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION || '1.21' }}

      # ── 3. 执行核心业务逻辑 ──
      - name: Execute Entrypoint
        run: |
          set -euo pipefail
          PROJ_DIR="${GITHUB_WORKSPACE}/${{ env.VAULT_DIR }}/projects/${{ env.PROJECT_NAME }}"
          cd "${PROJ_DIR}"
          
          echo "::group::📦 依赖检查与安装"
          if [[ "${RUNTIME}" == "python" && -f "requirements.txt" ]]; then
            python -m pip install --upgrade pip >/dev/null
            pip install -r requirements.txt
          elif [[ "${RUNTIME}" == "node" && -f "package.json" && ! "${ENTRYPOINT}" =~ "npm install" ]]; then
            npm install
          fi
          echo "::endgroup::"

          echo "::group::▶ 执行任务: ${ENTRYPOINT}"
          eval "${ENTRYPOINT}"
          echo "::endgroup::"

      # ── 4. 分发产物 (配置了 EXTERNAL_REPO 才执行) ──
      - name: Checkout External Repo
        if: env.EXTERNAL_REPO != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ env.EXTERNAL_REPO }}
          token: ${{ secrets.IFONGAP_PUSH_TOKEN }}
          path: 'external_repo_target'

      - name: Sync and Push
        if: env.EXTERNAL_REPO != ''
        run: |
          set -euo pipefail
          PROJ_DIR="${GITHUB_WORKSPACE}/${{ env.VAULT_DIR }}/projects/${{ env.PROJECT_NAME }}"
          TARGET_DIR="external_repo_target/${{ env.FINAL_DEST_DIR }}"
          FILE_TO_SYNC="${PROJ_DIR}/${{ env.OUTPUT_FILE }}"

          if [[ ! -e "${FILE_TO_SYNC}" ]]; then
            echo "::error::未找到声明的产物文件: ${FILE_TO_SYNC}"
            exit 1
          fi

          mkdir -p "${TARGET_DIR}"
          
          # 兼容文件或文件夹的拷贝
          if [[ -d "${FILE_TO_SYNC}" ]]; then
            cp -rf "${FILE_TO_SYNC}/." "${TARGET_DIR}/"
          else
            cp -f "${FILE_TO_SYNC}" "${TARGET_DIR}/"
          fi

          cd external_repo_target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Auto-update [${{ env.PROJECT_NAME }}]: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push origin main
            echo "成功推送到公开仓"
          else
            echo "::notice::产物无变化，跳过推送"
          fi

      # ── 5. 安全清理 ──
      - name: Purge Vault
        if: always()
        run: |
          set -euo pipefail
          VAULT_FULL_PATH="${GITHUB_WORKSPACE}/${{ env.VAULT_DIR }}"
          [[ -d "${VAULT_FULL_PATH}" ]] && rm -rf "${VAULT_FULL_PATH}" || true