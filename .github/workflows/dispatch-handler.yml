# ============================================================
# 文件：dispatch-handler.yml (任务接收端)
# 功能：响应 dispatch 事件，注入凭证并串行执行自动化任务流
# 依赖：需在 Secrets 中配置 GH_SOURCE_VAULT_REPO, GH_SOURCE_VAULT_PAT, GH_VAULT_DIR_NAME, 
#       CF_ACCOUNT_ID, CF_PAGES_WRITE_TOKEN, CF_WORKERS_WRITE_TOKEN, CF_TURNSTILE_SECRET_KEY
#       ALGOLIA_APP_ID, ALGOLIA_WRITE_KEY, ALGOLIA_INDEX_NAME
#       ENS_RESEND_KEY, ENS_ADMIN_TOKEN, ENS_GH_READ_TOKEN, ENS_WEBHOOK_SECRET
#               
# ============================================================
name: Dispatch Handler

on:
  repository_dispatch:
    types: [run-tasks]

# 调度策略：同项目同分支互斥（自动取消旧任务），跨项目支持并行
concurrency:
  group: deploy-${{ github.event.client_payload.project_path }}-${{ github.event.client_payload.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run-tasks:
    name: "[${{ github.event.client_payload.project_name || github.event.client_payload.project_path }}] Run Tasks"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_VAULT_DIR_NAME: ${{ secrets.GH_VAULT_DIR_NAME }}
      TARGET_PROJECT:    ${{ github.event.client_payload.project_path }}

    steps:
      # 1. 初始化运行环境
      - name: Checkout public repo
        uses: actions/checkout@v4

      # 2. 检出私有配置仓（包含脚本与项目逻辑）
      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GH_SOURCE_VAULT_REPO }}
          token:      ${{ secrets.GH_SOURCE_VAULT_PAT }}
          path:       ${{ secrets.GH_VAULT_DIR_NAME }}
          ref:        ${{ github.event.client_payload.sha || 'main' }}

      # 3. 加载版本配置（同时写入 ENV 和 Step Output 以消除时序依赖）
      - name: Load versions.env
        id: versions
        run: |
          set -euo pipefail
          VERSIONS_FILE="${GITHUB_WORKSPACE}/${GH_VAULT_DIR_NAME}/scripts/versions.env"
          [[ -f "${VERSIONS_FILE}" ]] || { echo "::error::versions.env 缺失: ${VERSIONS_FILE}"; exit 1; }
          # 导出至环境变量供后续脚本读取，导出至 Output 供 Action 引用
          grep -v '^\s*#' "${VERSIONS_FILE}" | grep -v '^\s*$' >> "$GITHUB_ENV"
          source "${VERSIONS_FILE}"
          echo "node_version=${NODE_VERSION}" >> "$GITHUB_OUTPUT"

      # 4. 准备 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node_version }}

      # 5. 挂载构建缓存（Hugo 二进制、npm 包、Hugo 模块）
      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/hugo
            ~/.npm
            ${{ github.workspace }}/.hugo-module-cache
          key: build-cache-${{ runner.os }}-${{ hashFiles(format('{0}/{1}/{2}/go.sum', github.workspace, env.GH_VAULT_DIR_NAME, env.TARGET_PROJECT)) }}
          restore-keys: build-cache-${{ runner.os }}-

      # 6. 解析并顺序执行任务队列
      - name: Run tasks
        env:
          # 业务凭证注入
          CLOUDFLARE_ACCOUNT_ID:   ${{ secrets.CF_ACCOUNT_ID }}
          CF_PAGES_WRITE_TOKEN:    ${{ secrets.CF_PAGES_WRITE_TOKEN }}
          CF_WORKERS_WRITE_TOKEN:  ${{ secrets.CF_WORKERS_WRITE_TOKEN }}
          CF_TURNSTILE_SECRET_KEY: ${{ secrets.CF_TURNSTILE_SECRET_KEY }}
          ALGOLIA_APP_ID:          ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_KEY:       ${{ secrets.ALGOLIA_WRITE_KEY }}	  
          ALGOLIA_INDEX_NAME:      ${{ secrets.ALGOLIA_INDEX_NAME }}
          ENS_RESEND_KEY:          ${{ secrets.ENS_RESEND_KEY }}
          ENS_ADMIN_TOKEN:         ${{ secrets.ENS_ADMIN_TOKEN }}
          ENS_GH_READ_TOKEN:       ${{ secrets.ENS_GH_READ_TOKEN }}          
          ENS_WEBHOOK_SECRET:      ${{ secrets.ENS_WEBHOOK_SECRET }}
          
          # 运行时上下文
          PROJECT_DIR:    ${{ github.workspace }}/${{ secrets.GH_VAULT_DIR_NAME }}/${{ github.event.client_payload.project_path }}
          HUGO_CACHE_DIR: ${{ github.workspace }}/.hugo-module-cache
        run: |
          set -euo pipefail

          VAULT_DIR="${GITHUB_WORKSPACE}/${GH_VAULT_DIR_NAME}"
          SCRIPTS_DIR="${VAULT_DIR}/scripts"
          TASK_FILE="${VAULT_DIR}/${TARGET_PROJECT}/task.json"

          [[ -f "${TASK_FILE}" ]] || { echo "::error::task.json 缺失"; exit 1; }

          export SCRIPTS_DIR TASK_FILE
          source "${SCRIPTS_DIR}/bootstrap.sh"
          
          echo "DEBUG PROJECT_NAME='${PROJECT_NAME:-<未设置>}'"
          echo "DEBUG PROJECT_DIR='${PROJECT_DIR:-<未设置>}'"
          echo "DEBUG CF_PAGES_WRITE_TOKEN='${CF_PAGES_WRITE_TOKEN:-<未设置>}'"

          # 兼容三种 task.json 格式：
          #   ① 字符串数组  ["hugo-build", "cfp-deploy"]
          #   ② 对象数组    [{"id": "hugo-build"}, ...]
          #   ③ 包裹对象    {"tasks": [{"id": "hugo-build"}, ...]}
          _JQ_TASKS='
            if type == "array" then
              if length == 0 then empty
              elif (.[0] | type) == "string" then .[]
              else .[].id end
            else .tasks[].id end
          '

          echo "::group::📜 待执行任务清单"
          jq -r "${_JQ_TASKS}" "${TASK_FILE}"
          echo "::endgroup::"

          # 逐项调用对应脚本
          while IFS= read -r task_id; do
            [[ -z "${task_id}" ]] && continue
            script="${SCRIPTS_DIR}/${task_id}.sh"
            [[ -f "${script}" ]] || { echo "::error::脚本缺失: ${script}"; exit 1; }
            [[ -x "${script}" ]] || chmod +x "${script}"
            echo "::group::▶ 执行任务: ${task_id}"
            bash "${script}"
            echo "::endgroup::"
          done < <(jq -r "${_JQ_TASKS}" "${TASK_FILE}")

      # 7. 敏感数据清理（无论成功与否均执行）
      - name: Cleanup vault
        if: always()
        run: |
          set -euo pipefail
          VAULT_DIR="${GITHUB_WORKSPACE}/${GH_VAULT_DIR_NAME}"
          [[ -d "${VAULT_DIR}" ]] || exit 0
          # 安全校验：仅允许删除 Workspace 内部路径
          RESOLVED=$(realpath -m "${VAULT_DIR}")
          WORKSPACE_RESOLVED=$(realpath "${GITHUB_WORKSPACE}")
          if [[ "${RESOLVED}/" == "${WORKSPACE_RESOLVED}/"* ]]; then
            rm -rf "${VAULT_DIR}"
            echo "Vault 数据已安全移除"
          else
            echo "::error::非法删除路径"; exit 1
          fi
