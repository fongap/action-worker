name: Module - Hugo Deploy

on:
  workflow_call:
    # 增加 inputs 接收来源路径
    inputs:
      project_path:
        required: true
        type: string

jobs:
  execute-deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CF_REQUEST_LIMIT: ${{ vars.CF_API_REQUEST_LIMIT || '5' }}
      CF_DEPLOYMENTS_LIMIT: ${{ vars.CF_DEPLOYMENT_KEEP_LIMIT || '2' }}
      
    steps:
      - name: ⬇️ 下载编译产物
        uses: actions/download-artifact@v4
        with:
          name: compiled-public
          path: public/

      - name: 🏷️ 解析项目名称
        run: |
          # 提取小写项目名并存入全局环境变量
          CLEAN_NAME=${{ vars.CF_PROJECT_NAME }}
          echo "CF_PROJECT_NAME=$CLEAN_NAME" >> $GITHUB_ENV
          echo "已确立项目名称为: $CLEAN_NAME"

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_Pages_WRITE_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # 改为读取 env 环境变量
          command: >
            pages deploy public
            --project-name=${{ env.CF_PROJECT_NAME }}
            --branch=main

      - name: 清理旧部署
        env:
          CF_API_TOKEN: ${{ secrets.CF_Pages_WRITE_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          # 直接复用步骤 2 中注入的 CF_PROJECT_NAME
          echo "目标项目: ${{ env.CF_PROJECT_NAME }}"

          # 拉取生产环境的部署列表
          API_URL="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${{ env.CF_PROJECT_NAME }}/deployments"
          
          # 翻页获取最近的部署 (通常前几页就够了)
          response=$(curl -s -X GET "$API_URL?per_page=25" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          # 检查 API 是否请求成功
          if [[ $(echo "$response" | jq -r '.success') != "true" ]]; then
            
            if echo "$response" | jq -e '.errors[] | select(.code == 8000007)' > /dev/null; then
              echo "ℹ️ 项目可能刚创建或尚未有历史记录，跳过清理阶段。"
              exit 0
            fi
            
            echo "⚠️ 获取部署列表遇到预期外错误，跳过清理。原始错误如下："
            echo "$response" | jq -c '.errors'
            exit 0
          fi
          
          # 筛选逻辑：生产环境 + 状态成功 + 按时间排序
          # 排除掉最新的 $CF_DEPLOYMENTS_LIMIT 个 ID
          mapfile -t TO_DELETE < <(echo "$response" | jq -r \
            --argjson keep "$CF_DEPLOYMENTS_LIMIT" \
            '.result 
            | map(select(.environment == "production" and .latest_stage.status == "success")) 
            | sort_by(.created_on) | reverse 
            | .[$keep:] | .[].id')

          if [[ ${#TO_DELETE[@]} -eq 0 ]]; then
            echo "✅ 当前成功版本少于 ${CF_DEPLOYMENTS_LIMIT} 个，无需清理。"
            exit 0
          fi

          # 执行并发删除
          echo "发现旧版本 ${#TO_DELETE[@]} 个，正在清理..."
          printf '%s\n' "${TO_DELETE[@]}" | xargs -I {} -P "$CF_REQUEST_LIMIT" bash -c \
            "curl -s -X DELETE '$API_URL/{}?force=true' \
            -H 'Authorization: Bearer $CF_API_TOKEN' \
            -H 'Content-Type: application/json' > /dev/null && echo '🗑️ 已删除部署: {}'"

          echo "✨ 清理完成。"