name: Module - Hugo Build

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      project_path:
        required: true
        type: string
    # 声明对外暴露的变量
    outputs:
      sync_type:
        description: "决定 Algolia 的同步策略"
        value: ${{ jobs.execute-build.outputs.sync_type }}

jobs:
  execute-build:
    runs-on: ubuntu-latest
    outputs:
      sync_type: ${{ steps.check_content.outputs.sync_type }}
    env:
      HUGO_VERSION: ${{ vars.HUGO_VERSION || '0.157.0' }}
      NODE_VERSION: ${{ vars.NODE_VERSION || '24' }}
      
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ secrets.VAULT_WORKER_BRIDGE_TOKEN }}
          sparse-checkout: ${{ inputs.project_path }}
          sparse-checkout-cone-mode: false
          fetch-depth: 0

      - name: 检查 Posts 目录是否更新
        id: check_content
        run: |
          cd ${{ inputs.project_path }}
          # [此处完整保留你原脚本中的 check_content Bash 逻辑]
          # 注意：原逻辑中的路径判断可能需要适配当前所在的 ${inputs.project_path} 目录
          # ...
          # echo "sync_type=$SYNC_TYPE" >> "$GITHUB_OUTPUT"

      - name: 安装环境
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 构建 Hugo 站点
        env:
          HUGO_ENV: production
          HUGO_BASEURL: ${{ vars.SITE_BASE_URL }}
        run: |
          cd ${{ inputs.project_path }}
          if [ -f package-lock.json ]; then npm ci --prefer-offline; elif [ -f package.json ]; then npm install; fi
          hugo --gc --minify --baseURL "$HUGO_BASEURL" --cacheDir /tmp/hugo_cache

      - name: ⬆️ 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: compiled-public
          path: ${{ inputs.project_path }}/public/
          retention-days: 1