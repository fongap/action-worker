name: Universal Router
on:
  repository_dispatch:
    types: [universal_task]

jobs:
  # ==========================================
  # 模块 1：构建引擎
  # ==========================================
  hugo-build:
    # 触发条件：清单中包含 hugo-build
    if: contains(github.event.client_payload.tasks, 'hugo-build')
    uses: ./.github/workflows/tmpl-hugo-build.yml
    with:
      source_repo: ${{ github.event.client_payload.source_repo }}
      project_path: ${{ github.event.client_payload.project_path }}
    secrets: inherit

  # ==========================================
  # 模块 2：部署引擎 (并发分支 A)
  # ==========================================
  hugo-deploy:
    needs: hugo-build
    # 触发条件：A. 构建成功 + B. 清单中包含 hugo-deploy
    if: success() && contains(github.event.client_payload.tasks, 'hugo-deploy')
    uses: ./.github/workflows/tmpl-hugo-deploy.yml
    with:
      project_path: ${{ matrix.project }} #
    secrets: inherit

  # ==========================================
  # 模块 3：搜索同步引擎 (并发分支 B)
  # ==========================================
  algolia-sync:
    needs: hugo-build
    # 触发条件：A. 构建成功 + B. 清单中包含 algolia-sync + C. 动态业务校验 (有增量变动)
    if: >
      success() && 
      contains(github.event.client_payload.tasks, 'algolia-sync') && 
      needs.hugo-build.outputs.sync_type != 'none'
    uses: ./.github/workflows/tmpl-algolia-sync.yml
    secrets: inherit
    
  # ==========================================
  # 模块 4：Cloudflare Workers 部署引擎
  # ==========================================
  cfworker-deploy:
    # 触发条件：清单中包含 cfworkers-deploy
    if: contains(github.event.client_payload.tasks, 'cfworkers-deploy')
    uses: ./.github/workflows/tmpl-cfworkers-deploy.yml
    with:
      source_repo: ${{ github.event.client_payload.source_repo }}
      project_path: ${{ github.event.client_payload.project_path }}
    secrets: inherit
    
  # ==========================================
  # 模块 5：Cloudflare Pages 部署引擎
  # ==========================================    
  cfpages-deploy:
    if: contains(github.event.client_payload.tasks, 'cfpages-deploy')
    uses: ./.github/workflows/tmpl-cfpages-deploy.yml
    with:
      source_repo: ${{ github.event.client_payload.source_repo }}
      project_path: ${{ github.event.client_payload.project_path }}
      publish_dir: ${{ github.event.client_payload.publish_dir }}
    secrets: inherit
    
  # ==========================================
  # 模块 6：Test 部署引擎
  # ==========================================    
  pages-deploy:
    if: contains(github.event.client_payload.tasks, 'pages-deploy')
    uses: ./.github/workflows/tmpl-pages-deploy.yml
    with:
      dist_dir: 'dist' 
    secrets: inherit