name: Badge Updater
on:
  workflow_run:
    workflows: ["Cron Runner", "Push Runner"]
    types: [completed]

permissions:
  contents: write

jobs:
  badge_updater:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码仓库
        uses: actions/checkout@v6

      - name: 文档徽章更新
        run: |
          set -euo pipefail
          
          STAMP=$(date -u +'%Y--%m--%d')
          
          sed -i "s/{{LAST_UPDATE}}/${STAMP}/g" README.md
          sed -i "s/最近更新-[0-9]\{4\}--[0-9]\{2\}--[0-9]\{2\}-007acc/最近更新-${STAMP}-007acc/g" README.md
          
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -d ".githooks" ]; then
            echo "::info::检测到 .githooks 文件夹，使用自动备注。"
            git config --local core.hooksPath .githooks
            chmod +x .githooks/prepare-commit-msg
            COMMIT_MSG="update"
          else
            echo "::warning::未发现 .githooks 文件夹，使用默认备注。"
            COMMIT_MSG="chore: update badge ${STAMP}"
          fi
          
          git add README.md
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "$COMMIT_MSG" -m "[skip ci]"
            git push
          else
            echo "::notice::README 内容无变化，跳过提交。"
          fi

      - name: 工作流状态验证
        if: always() 
        run: |
          echo "Workflow : ${{ github.event.workflow_run.name }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]] || exit 1