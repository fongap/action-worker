name: Badge Updater
on:
  workflow_run:
    workflows: ["Cron Runner", "Push Runner"]
    types: [completed]

permissions:
  contents: write

jobs:
  badge_updater:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码仓库
        uses: actions/checkout@v6

      - name: 文档徽章更新
        run: |
          set -euo pipefail
          
          STAMP=$(date -u +'%Y--%m--%d')
          
          sed -i "s/{{LAST_UPDATE}}/${STAMP}/g" README.md
          sed -i "s/最近更新-[0-9]\{4\}--[0-9]\{2\}--[0-9]\{2\}-007acc/最近更新-${STAMP}-007acc/g" README.md
          
          CHANGED_FILE=$(git status --porcelain | awk '{print $NF}' | xargs -n1 basename | head -n 1)
          COMMIT_TITLE="update ${CHANGED_FILE:-files}"
          
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          git commit -m "$COMMIT_TITLE" -m "[skip ci]" || exit 0
          git push

      - name: 工作流状态验证
        if: always() 
        run: |
          echo "Workflow : ${{ github.event.workflow_run.name }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]] || exit 1