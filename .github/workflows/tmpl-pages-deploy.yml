# ==================================================================
# 版本：0.26.03.13
# [Secret]  
# VAULT_WORKER_BRIDGE_TOKEN    # Github 跨仓库授权桥接令牌。
#
# CF_ACCOUNT_ID                # Cloudflare 帐户ID。
# CF_Pages_WRITE_TOKEN         # Cloudflare Pages 编辑权限令牌。
# ==================================================================

name: Module - CFPages Deploy

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      project_path:
        required: true
        type: string
      publish_dir:
        description: '相对 project_path 的部署子目录（默认根目录）'
        required: false
        type: string
        default: '' 

jobs:
  execute-static-deploy:
    runs-on: ubuntu-latest
    env:
      # 策略：保留 2 个最近的成功版本
      CF_DEPLOYMENTS_LIMIT: 2
      # 并发请求限制（防止触发 API 频率限制）
      CF_REQUEST_LIMIT: 5

    steps:
      - name: 📥 Sparse Checkout Source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ secrets.VAULT_WORKER_BRIDGE_TOKEN }}
          sparse-checkout: ${{ inputs.project_path }}
          sparse-checkout-cone-mode: false

      - name: 🏷️ Resolve Project Name
        run: |
          # 提取末级目录名，防止 project_path 包含多级路径导致正则匹配失败或命名非法
          RAW_NAME=$(basename "${{ inputs.project_path }}")
          
          # 提取小写项目名并存入全局环境变量，供后续所有步骤使用 (兼容大小写 Project 前缀)
          CLEAN_NAME=$(echo "$RAW_NAME" | sed -E 's/^[pP]roject-//' | tr '[:upper:]' '[:lower:]')
          echo "CF_PROJECT_NAME=$CLEAN_NAME" >> $GITHUB_ENV
          echo "已确立项目名称为: $CLEAN_NAME"

      - name: 🏗️ Ensure Project Exists (Create if not found)
        run: |
          # 检查项目状态
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CF_Pages_WRITE_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${CF_PROJECT_NAME}")

          # 若返回 404，执行新建
          if [ "$STATUS" = "404" ]; then
            echo "项目 ${CF_PROJECT_NAME} 不存在，正在通过 API 创建..."
            curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects" \
              -H "Authorization: Bearer ${{ secrets.CF_Pages_WRITE_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${CF_PROJECT_NAME}\", \"production_branch\": \"main\"}"
          else
            echo "项目 ${CF_PROJECT_NAME} 已存在，准备执行覆盖部署。"
          fi

      - name: 🚀 Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_Pages_WRITE_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # 拼接路径并执行部署，Wrangler 会自动将新版设为当前激活版本
          command: >
            pages deploy ${{ inputs.project_path }}/${{ inputs.publish_dir }}
            --project-name=${{ env.CF_PROJECT_NAME }}
            --branch=main

      - name: 🧹 Cleanup Old Deployments
        if: success()
        env:
          CF_API_TOKEN: ${{ secrets.CF_Pages_WRITE_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          echo "目标项目: ${{ env.CF_PROJECT_NAME }}"

          # 拉取生产环境的部署列表
          API_URL="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT_NAME}/deployments"
          
          response=$(curl -s -X GET "$API_URL?per_page=25" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          if [[ $(echo "$response" | jq -r '.success') != "true" ]]; then
            if echo "$response" | jq -e '.errors[] | select(.code == 8000007)' > /dev/null; then
              echo "ℹ️ 项目可能刚创建或尚未有历史记录，跳过清理阶段。"
              exit 0
            fi
            
            echo "⚠️ 获取部署列表遇到预期外错误，跳过清理。原始错误如下："
            echo "$response" | jq -c '.errors'
            exit 0
          fi
          
          # 筛选逻辑：生产环境 + 状态成功 + 按时间排序
          # 排除掉最新的 $CF_DEPLOYMENTS_LIMIT 个 ID
          mapfile -t TO_DELETE < <(echo "$response" | jq -r \
            --argjson keep "$CF_DEPLOYMENTS_LIMIT" \
            '.result 
            | map(select(.environment == "production" and .latest_stage.status == "success")) 
            | sort_by(.created_on) | reverse 
            | .[$keep:] | .[].id')

          if [[ ${#TO_DELETE[@]} -eq 0 ]]; then
            echo "✅ 当前成功版本少于 ${CF_DEPLOYMENTS_LIMIT} 个，无需清理。"
            exit 0
          fi

          echo "发现旧版本 ${#TO_DELETE[@]} 个，正在清理..."
          printf '%s\n' "${TO_DELETE[@]}" | xargs -I {} -P "$CF_REQUEST_LIMIT" bash -c \
            "curl -s -X DELETE '$API_URL/{}?force=true' \
            -H 'Authorization: Bearer $CF_API_TOKEN' \
            -H 'Content-Type: application/json' > /dev/null && echo '🗑️ 已删除部署: {}'"

          echo "✨ 清理完成。"