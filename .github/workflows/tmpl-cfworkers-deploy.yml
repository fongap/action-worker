/**
 * 版本：0.26.03.13
 * [Secret]  
 * VAULT_WORKER_BRIDGE_TOKEN    # Github 跨仓库授权桥接令牌。
 *
 * CF_ACCOUNT_ID                # Cloudflare 帐户ID。
 * CF_Workers_WRITE_TOKEN       # Cloudflare Workers 编辑权限令牌。
 *
 * ENS_RESEND_KEY               # Resend 邮件服务 API Key
 * ENS_ADMIN_TOKEN              # Engine Suite 管理端鉴权令牌
 * ENS_GH_PAT_TOKEN             # 用于在 Worker 中操作 GitHub 的令牌
 * ENS_WEBHOOK_SECRET           # Engine Suite Webhook 签名验证密钥
 * ENS_ALGOLIA_SYNC_TOKEN       # Algolia WRIT KEY
 * ENS_TURNSTILE_SECRET_KEY     # TURNSTILE SECRET Key
 *
 */
 
name: Module - Workers Deploy

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      project_path:
        required: true
        type: string

jobs:
  execute-worker-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Sparse Checkout Source Vault
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ secrets.VAULT_WORKER_BRIDGE_TOKEN }}
          sparse-checkout: ${{ inputs.project_path }}
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Dependencies
        run: |
          cd ${{ inputs.project_path }}
          # 兼容 package-lock.json 存在与否的情况
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: 🚀 Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          # 核心属性：指定 wrangler 运行的子目录
          workingDirectory: ${{ inputs.project_path }}
          apiToken: ${{ secrets.CF_Workers_WRITE_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          secrets: |
            ENS_ADMIN_TOKEN
            ENS_GH_PAT_TOKEN
            ENS_WEBHOOK_SECRET
            ENS_ALGOLIA_SYNC_TOKEN
            ENS_TURNSTILE_SECRET_KEY
            ENS_RESEND_KEY
        env:
          ENS_ADMIN_TOKEN: ${{ secrets.ENS_ADMIN_TOKEN }}
          ENS_GH_PAT_TOKEN: ${{ secrets.ENS_GH_PAT_TOKEN }}
          ENS_WEBHOOK_SECRET: ${{ secrets.ENS_WEBHOOK_SECRET }}
          ENS_ALGOLIA_SYNC_TOKEN: ${{ secrets.ENS_ALGOLIA_SYNC_TOKEN }}
          ENS_TURNSTILE_SECRET_KEY: ${{ secrets.ENS_TURNSTILE_SECRET_KEY }}
          ENS_RESEND_KEY: ${{ secrets.ENS_RESEND_KEY }}
          ENS_ENVIRONMENT: 'production'

      - name: 🧹 Clean up old deployments
        env:
          CF_Workers_WRITE_TOKEN: ${{ secrets.CF_Workers_WRITE_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # 必须进入项目子目录才能读取到正确的 wrangler.toml
          cd ${{ inputs.project_path }}
          
          # 提取 Worker 名称
          WORKER_NAME=$(awk -F'"' '/^name[ \t]*=/ {print $2}' wrangler.toml)
          API_URL="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/$WORKER_NAME/deployments"
          
          echo "正在查询 Worker: $WORKER_NAME 的部署记录..."
          
          DEPLOYMENTS=$(curl -s -X GET "$API_URL" \
            -H "Authorization: Bearer $CF_Workers_WRITE_TOKEN" \
            -H "Content-Type: application/json")
          
          if [ "$(echo "$DEPLOYMENTS" | jq -r '.success')" != "true" ]; then
            echo "获取列表失败，跳过清理。"
            exit 0
          fi
          
          # 保留最新的 3 个部署，删除其余的
          IDS_TO_DELETE=$(echo "$DEPLOYMENTS" | jq -r '(.result.items // .result.deployments)[3:][].id')
          
          for ID in $IDS_TO_DELETE; do
            if [ -n "$ID" ] && [ "$ID" != "null" ]; then
              curl -s -X DELETE "$API_URL/$ID" \
                -H "Authorization: Bearer $CF_Workers_WRITE_TOKEN" \
                -H "Content-Type: application/json" > /dev/null
              echo "已清理旧部署记录: $ID"
            fi
          done