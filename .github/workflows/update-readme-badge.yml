name: Update Readme Badge

on:
  workflow_run:
    workflows:
      - "Cron Dispatch Handler"
      - "Push Dispatch Handler"
    types: [completed]

permissions:
  contents: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ── 1. 更新 README 构建时间 badge ──
      - name: Update README
        run: |
          set -euo pipefail
          STAMP=$(date -d '+8 hours' +'%Y--%m--%d')
          sed -i "s/{{LAST_UPDATE}}/${STAMP}/g" README.md
          sed -i "s/最近更新-[0-9]\{4\}--[0-9]\{2\}--[0-9]\{2\}-007acc/最近更新-${STAMP}-007acc/g" README.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md 无变更，跳过提交"
          else
            git commit -m "chore: update README badge" -m "[skip ci]"
            git push
          fi

      # ── 2. 透传上游结论，驱动 badge 状态 ──
      - name: Check Upstream Result
        run: |
          echo "Workflow : ${{ github.event.workflow_run.name }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]] || exit 1