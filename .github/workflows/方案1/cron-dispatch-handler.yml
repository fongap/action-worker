
name: Cron Dispatch

on:
  repository_dispatch:
    types: [cron-tasks]

concurrency:
  group: cron-${{ github.event.client_payload.project }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  execute:
    name: Execute Task
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VAULT_DIR:    _vault
      PROJECT_NAME: ${{ github.event.client_payload.project }}

    steps:
      # 拉取配置仓库
      - name: Checkout Vault
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GH_SOURCE_VAULT_REPO }}
          token:      ${{ secrets.GH_SOURCE_VAULT_PAT }}
          path:       ${{ env.VAULT_DIR }}
          sparse-checkout: |
            defaults.env
            bootstrap.sh
            scripts
            projects/${{ env.PROJECT_NAME }}
          sparse-checkout-cone-mode: false

      # 加载项目配置
      - name: Load Config
        run: |
          set -euo pipefail

          PROJ_DIR=$(find "${GITHUB_WORKSPACE}/${VAULT_DIR}" \
            -mindepth 2 -maxdepth 3 \
            -type d -name "$(basename "${PROJECT_NAME}")" \
            | head -1)
          [[ -n "${PROJ_DIR}" ]] || { echo "::error::project dir not found: ${PROJECT_NAME}"; exit 1; }
          echo "PROJ_DIR=${PROJ_DIR}" >> "$GITHUB_ENV"

          DEFAULTS="${GITHUB_WORKSPACE}/${VAULT_DIR}/defaults.env"
          PROJECT_CONFIG="${PROJ_DIR}/config.env"

          [[ -f "${DEFAULTS}" ]]       || { echo "::error::missing: ${DEFAULTS}";       exit 1; }
          [[ -f "${PROJECT_CONFIG}" ]] || { echo "::error::missing: ${PROJECT_CONFIG}"; exit 1; }

          grep -v '^\s*#' "${DEFAULTS}"       | grep -v '^\s*$' >> "$GITHUB_ENV"
          grep -v '^\s*#' "${PROJECT_CONFIG}" | grep -v '^\s*$' >> "$GITHUB_ENV"

      # 检测运行环境
      - name: Detect Runtime
        run: |
          set -euo pipefail

          if [[ -n "${RUNTIME:-}" ]]; then
            exit 0
          fi

          if   [[ -f "${PROJ_DIR}/requirements.txt" ]] \
            || [[ -f "${PROJ_DIR}/pyproject.toml"   ]] \
            || compgen -G "${PROJ_DIR}/*.py" > /dev/null 2>&1; then
            detected="python"
          elif [[ -f "${PROJ_DIR}/package.json" ]] \
            || compgen -G "${PROJ_DIR}/*.js"  > /dev/null 2>&1 \
            || compgen -G "${PROJ_DIR}/*.ts"  > /dev/null 2>&1; then
            detected="node"
          elif [[ -f "${PROJ_DIR}/go.mod" ]] \
            || compgen -G "${PROJ_DIR}/*.go" > /dev/null 2>&1; then
            detected="go"
          else
            detected="shell"
          fi

          echo "RUNTIME=${detected}" >> "$GITHUB_ENV"

      # 执行引导程序
      - name: Run Bootstrap
        run: |
          set -euo pipefail
          BOOTSTRAP="${GITHUB_WORKSPACE}/${VAULT_DIR}/bootstrap.sh"
          [[ -f "${BOOTSTRAP}" ]] || { echo "::error::missing: ${BOOTSTRAP}"; exit 1; }
          bash "${BOOTSTRAP}" "${PROJ_DIR}"

      # 执行核心任务
      - name: Execute Tasks
        run: |
          set -euo pipefail
          SCRIPTS_DIR="${GITHUB_WORKSPACE}/${VAULT_DIR}/scripts"
          TASK_FILE="${PROJ_DIR}/task.json"
          cd "${PROJ_DIR}"

          _JQ='
            if type == "array" then
              if length == 0 then empty
              elif (.[0] | type) == "string" then .[]
              else .[].id end
            else .tasks[].id end
          '

          if [[ -f "${TASK_FILE}" ]]; then
            mapfile -t task_ids < <(jq -r "${_JQ}" "${TASK_FILE}")

            echo "::group::task queue"
            printf '%s\n' "${task_ids[@]}"
            echo "::endgroup::"

            for task_id in "${task_ids[@]}"; do
              [[ -z "${task_id}" ]] && continue
              script="${SCRIPTS_DIR}/${task_id}.sh"
              [[ -f "${script}" ]] || { echo "::error::missing script: ${script}"; exit 1; }
              [[ -x "${script}" ]] || chmod +x "${script}"
              echo "::group::▶ ${task_id}"
              bash "${script}"
              echo "::endgroup::"
            done

          else
            [[ -n "${SCRIPT:-}" ]] || { echo "::error::SCRIPT undefined and no task.json"; exit 1; }
            [[ -f "${SCRIPT}"    ]] || { echo "::error::script not found: ${SCRIPT}";      exit 1; }

            case "${RUNTIME}" in
              python) CMD=(python "${SCRIPT}") ;;
              node)   CMD=(node   "${SCRIPT}") ;;
              go)     CMD=(go run "${SCRIPT}") ;;
              shell)  CMD=(bash   "${SCRIPT}") ;;
              *) echo "::error::unsupported runtime: ${RUNTIME}"; exit 1 ;;
            esac

            echo "::group::▶ [${RUNTIME}] ${SCRIPT}"
            "${CMD[@]}"
            echo "::endgroup::"
          fi

      # 拉取目标仓库
      - name: Checkout Target
        if: env.EXTERNAL_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.EXTERNAL_REPO }}
          token:      ${{ secrets.GH_TARGET_REPO_PAT }}
          path:       _target

      # 同步输出产物
      - name: Sync Output
        if: env.EXTERNAL_REPO != ''
        run: |
          set -euo pipefail
          SRC="${PROJ_DIR}/${OUTPUT_FILE}"
          DST="_target/${FINAL_DEST_DIR}"

          [[ -e "${SRC}" ]] || { echo "::error::artifact not found: ${SRC}"; exit 1; }
          mkdir -p "${DST}"
          if [[ -d "${SRC}" ]]; then cp -rf "${SRC}/." "${DST}/"; else cp -f "${SRC}" "${DST}/"; fi

          cd _target
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "chore: automated update $(date -u +'%Y-%m-%d') [skip ci]"
            git push origin main
          else
            echo "::notice::no changes, skipping push"
          fi

      # 清理私密数据
      - name: Purge Vault
        if: always()
        run: |
          set -euo pipefail
          VAULT_PATH="${GITHUB_WORKSPACE}/${VAULT_DIR}"
          [[ -d "${VAULT_PATH}" ]] || exit 0

          RESOLVED=$(realpath -m "${VAULT_PATH}")
          WS=$(realpath "${GITHUB_WORKSPACE}")
          if [[ "${RESOLVED}/" == "${WS}/"* ]]; then
            rm -rf "${VAULT_PATH}"
          else
            echo "::error::unsafe path rejected: ${RESOLVED}"; exit 1
          fi