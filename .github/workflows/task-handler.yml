# .github/workflows/task-handler.yml
name: Task Handler

on:
  repository_dispatch:
    types: [execute-ephemeral-sandbox]

env:
  PROJECTS_DIR: ${{ vars.IVMS_PROJECTS_DIR || 'projects' }}

jobs:
  run-isolated-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Initialize Strict Memory Sandbox
        run: |
          sudo mkdir -p /dev/shm/ivms
          sudo chmod 700 /dev/shm/ivms

      - name: 2. Ephemeral Vault Sync (Dynamic Payload)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.VAULT_REPO_PATH }}
          token: ${{ secrets.VAULT_ACCESS_TOKEN }}
          path: sandbox-context
          sparse-checkout: |
            engine/
            bricks/
            bootstrap.sh
            .env.system
            ${{ env.PROJECTS_DIR }}/${{ github.event.client_payload.project_name }}/
          sparse-checkout-cone-mode: false

      - name: 3. Hydrate Global Secrets
        working-directory: ./sandbox-context
        run: |
          echo "${{ secrets.SYSTEM_GLOBAL_SECRETS }}" > secrets.env
          chmod 600 secrets.env

      - name: 4. Ignite Execution Engine
        working-directory: ./sandbox-context
        run: |
          bash bootstrap.sh project_name=${{ github.event.client_payload.project_name }}

      - name: 5. Absolute Physical Erasure
        if: always()
        run: |
          echo "[CLEANUP] 执行阅后即焚级销毁..."
          sudo rm -rf /dev/shm/ivms
          find . -name "*.env*" -exec shred -u {} \; 2>/dev/null || true
          rm -rf ${{ github.workspace }}/*
          rm -rf ${{ github.workspace }}/.* 2>/dev/null || true